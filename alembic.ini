# Alembic configuration for GymCore.
# The database URL is NOT stored here — env.py reads it from app settings
# (.env), so there is a single source of truth and no secret in this file.

[alembic]
script_location = migrations
prepend_sys_path = .
# Readable, ordered version filenames: 0001_baseline_schema.py, ...
file_template = %%(rev)s_%%(slug)s
# sqlalchemy.url is injected at runtime by migrations/env.py.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
