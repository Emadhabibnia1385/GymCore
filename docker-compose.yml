services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: bring the database schema up to date, then exit. Every app
  # service waits for this to finish successfully before starting, so the
  # schema is always migrated before anything reads or writes it.
  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - uploads:/srv/gymcore/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      # Loopback only — public traffic goes through nginx.
      - "127.0.0.1:${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  telegram-bot:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.bots.telegram_main"]
    env_file: .env
    volumes:
      - uploads:/srv/gymcore/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  bale-bot:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.bots.bale_main"]
    env_file: .env
    volumes:
      - uploads:/srv/gymcore/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Background worker: sends automated low-session / inactivity reminders.
  reminders:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.jobs.reminders"]
    env_file: .env
    volumes:
      - uploads:/srv/gymcore/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      # Set HTTP_PORT in .env when port 80 is taken by another service
      # on the same server (e.g. HTTP_PORT=8090 -> http://domain:8090).
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
